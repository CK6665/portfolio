<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chengbo's Portfolio</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <aside class="sidebar">

        <div class="profile">

            <div class="avatar">

                <span>C</span>

            </div>

            <h2>Chengbo</h2>

            <p class="role">
                Portfolio
            </p>

            <div class="status">

                <span class="dot occupied"></span>

                Occupied

            </div>

        </div>

        <button
            id="themeToggle"
            class="theme-button">

            🌙 Dark Mode

        </button>

        <nav class="navigation">

            <button
                class="nav-button active"
                data-page="homePage">

                🏠 Home

            </button>

            <button
                class="nav-button"
                data-page="aboutPage">

                👤 About

            </button>

            <button
                class="nav-button"
                data-page="projectsPage">

                💻 Projects

            </button>

            <button
                class="nav-button"
                data-page="skillsPage">

                ⭐ Skills

            </button>

            <button
                class="nav-button"
                data-page="contactPage">

                📞 Contact

            </button>

        </nav>

    </aside>

    <main class="main-content">

        <!-- HOME -->

        <section id="homePage">

            <div class="hero">

                <p class="greeting">

                    Hello 👋

                </p>

                <h1>

                    I'm Chengbo.

                </h1>

                <p class="hero-description">

                    Future Software Engineer

                </p>

                <div class="hero-buttons">

                    <button
                        class="primary-btn"
                        id="projectsShortcut">

                        View Projects

                    </button>

                    <button
                        class="secondary-btn"
                        id="contactShortcut">

                        Contact Me

                    </button>

                </div>

            </div>

        </section>

        <!-- ABOUT -->

        <section id="aboutPage">

            <div class="card">

                <h1 class="section-title">

                    About

                </h1>

                <p>

                </p>

            </div>

        </section>

        <!-- PROJECTS -->

        <section id="projectsPage">

            <div class="card">

                <h1 class="section-title">

                    Projects

                </h1>

                <p>

                </p>

            </div>

        </section>

        <!-- SKILLS -->

        <section id="skillsPage">

            <div class="card">

                <h1 class="section-title">

                    Skills

                </h1>

                <p>

                </p>

            </div>

        </section>

        <!-- CONTACT -->

        <section id="contactPage">

            <div class="card">

                <h1 class="section-title">

                    Contact

                </h1>

                <p>

                </p>

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
